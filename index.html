<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000">
  <title>Downhill Cyclist</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100dvh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    /* ── on-screen controls ── */
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 10px env(safe-area-inset-bottom, 10px);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 10;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }

    .ctrl-group {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }

    .ctrl-btn {
      width: 56px;
      height: 56px;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      background: rgba(0,0,0,0.35);
      color: rgba(255,255,255,0.7);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      transition: background 0.05s;
    }
    .ctrl-btn.pressed {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.5);
    }
    .ctrl-btn span {
      pointer-events: none;
      line-height: 1;
    }

    /* steer buttons slightly larger */
    .ctrl-btn.steer {
      width: 64px;
      height: 64px;
      font-size: 26px;
    }

    /* label under button */
    .ctrl-labeled {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      pointer-events: auto;
    }
    .ctrl-label {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      font-family: system-ui, sans-serif;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    /* top-right mute */
    #mute-btn {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      right: 8px;
      z-index: 10;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      color: rgba(255,255,255,0.6);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
    }
    #mute-btn.muted {
      opacity: 0.4;
      border-color: rgba(255,255,255,0.1);
    }

    /* hide buttons on desktop (keyboard works) */
    @media (hover: hover) and (pointer: fine) {
      .controls { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <button id="mute-btn" aria-label="Toggle mute"><span>♪</span></button>

  <div class="controls">
    <!-- left: steering -->
    <div class="ctrl-group">
      <div class="ctrl-labeled">
        <button class="ctrl-btn steer" data-key="ArrowLeft"><span>◀</span></button>
      </div>
      <div class="ctrl-labeled">
        <button class="ctrl-btn steer" data-key="ArrowRight"><span>▶</span></button>
      </div>
    </div>

    <!-- right: actions -->
    <div class="ctrl-group">
      <div class="ctrl-labeled">
        <button class="ctrl-btn" data-key="ArrowDown"><span>▼</span></button>
        <span class="ctrl-label">BRAKE</span>
      </div>
      <div class="ctrl-labeled">
        <button class="ctrl-btn" data-key="Space"><span>🔔</span></button>
        <span class="ctrl-label">BELL</span>
      </div>
      <div class="ctrl-labeled">
        <button class="ctrl-btn" data-key="ArrowUp"><span>▲</span></button>
        <span class="ctrl-label">PEDAL</span>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
